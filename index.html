<script>
    const arquivoNota = 'blog-0015.md?v=' + Date.now();

function conversorMarkdownLite(texto) {
    return texto
        // Títulos
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')

        // Negrito
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')

        // Itálico
        .replace(/\*(.*?)\*/g, '<em>$1</em>')

        // Links
        .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" style="color:#007bff;text-decoration:none;">$1</a>')

        // Listas
        .replace(/^\s*[-*]\s+(.*)$/gim, '<li style="margin-left:20px;">$1</li>')

        // 🔥 IMPORTANTE: não quebrar HTML
        .replace(/\n{2,}/g, '<br><br>');
}

    fetch(arquivoNota)
        .then(response => {
            if (!response.ok) throw new Error('Arquivo não encontrado');
            return response.text();
        })
        .then(texto => {
            // Aplica o conversor direto no texto recebido
            document.getElementById('conteudo-nota').innerHTML = conversorMarkdownLite(texto);
        })
        .catch(err => {
            document.getElementById('conteudo-nota').innerHTML = "Erro ao carregar o conteúdo.";
            console.error(err);
        });
</script>
