<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação</title>
    <style>
    
body {
    font-family: Arial, sans-serif;
    background-color: #ffffff !important;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    filter: none !important;
}   

textarea {
    width: 100% !important;
    box-sizing: border-box;
    margin: 8px 0 0 0;
    padding: 8px;
    display: block;
}   

        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .btn-fechar, .btn-bio {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-fechar {
            background-color: #ccc;
            color: #000;
        }
        .btn-bio {
            background-color: #000;
            color: white;
        }
        .btn-fechar:hover, .btn-bio:hover {
            opacity: 0.9;
        }
        .stars {
            font-size: 30px;
            color: #ccc;
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 4px;
            margin: 10px 0;
        }
        .stars input {
            display: none;
        }
        .stars label {
            cursor: pointer;
            color: #ccc;
            transition: color 0.2s;
        }
        .stars input:checked ~ label,
        .stars input:checked + label,
        .stars input:not(:checked) + label:hover,
        .stars input:not(:checked) + label:hover ~ label {
            color: #000000;
        }
        #form-section, #thank-you-section {
            transition: opacity 0.5s ease;
        }
        #thank-you-section {
            display: none;
            opacity: 0;
        }
    </style>
</head>


<body>




    <div id="thank-you-section" class="container">
        <h1>Obrigado!</h1>
        <p>Sua participação é muito importante para mim.</p>


<a href="#" class="btn btn-fechar" onclick="window.close(); return false;">Fechar esta página</a>
        <a href="https://bio.site/chmartinelle" class="btn btn-bio" target="_blank">Abrir Links da BIO</a>
    </div>





    <script>
        document.getElementById('feedback-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            try {
                const response = await fetch('https://formspree.io/f/xojpgyjy', {
                    method: 'POST',
                    body: new FormData(this),
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) {
                    document.getElementById('form-section').style.opacity = 0;
                    setTimeout(() => {
                        document.getElementById('form-section').style.display = 'none';
                        document.getElementById('thank-you-section').style.display = 'block';
                        setTimeout(() => {
                            document.getElementById('thank-you-section').style.opacity = 1;
                        }, 10);
                    }, 500);
                } else {
                    alert('Erro ao enviar. Tente novamente.');
                }
            } catch (error) {
                alert('Erro de conexão. Tente novamente.');
            }
        });

        function fecharAvaliacao() {
    document.getElementById('form-section').style.opacity = 0;
    setTimeout(() => {
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('thank-you-section').style.display = 'block';
        setTimeout(() => {
            document.getElementById('thank-you-section').style.opacity = 1;
        }, 10);
    }, 500);
}   
    </script>
      
</body>
</html>
