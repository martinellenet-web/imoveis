<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação</title>
    <style>
    
body {
    font-family: Arial, sans-serif;
    background-color: #ffffff !important;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    filter: none !important;
}   

textarea {
    width: 100% !important;
    box-sizing: border-box;
    margin: 8px 0 0 0;
    padding: 8px;
    display: block;
}   

        .container {
            background-color: #CCC;
            padding: 20px;
            border-radius: 0px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .btn-fechar, .btn-bio {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-fechar {
            background-color: #ccc;
            color: #000;
        }
        .btn-bio {
            background-color: #000;
            color: white;
        }
        .btn-fechar:hover, .btn-bio:hover {
            opacity: 0.9;
        }
        .stars {
            font-size: 30px;
            color: #ccc;
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 4px;
            margin: 10px 0;
        }
        .stars input {
            display: none;
        }
        .stars label {
            cursor: pointer;
            color: #ccc;
            transition: color 0.2s;
        }
        .stars input:checked ~ label,
        .stars input:checked + label,
        .stars input:not(:checked) + label:hover,
        .stars input:not(:checked) + label:hover ~ label {
            color: #000000;
        }
        #form-section, #thank-you-section {
            transition: opacity 0.5s ease;
        }
        #thank-you-section {
            display: none;
            opacity: 0;
        }
    </style>
</head>


<body>

<div id="thank-you-section" class="container" style="display: block; opacity: 1; font-family: Arial, sans-serif;">

<!-- SEU WIDGET DE AVALIAÇÃO (agora acima da citação) -->
<div style="margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px; font-size: 14px; color: #555; text-align: left;">
    <p style="margin: 5px 0;">
        <strong>Média das últimas 5 avaliações:</strong>
        <span style="color: #FFD700;">★★★☆☆</span> 3/5
    </p>

    <p style="margin: 10px 0 0 0; font-size: 14px; color: #333;">
        Sua participação é muito importante para mim! Deixe uma avaliação anônima.
    </p>
</div>



    <!-- Botões alinhados -->
<div style="display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; align-items: center; min-height: 70px;">   
    <!-- Botões aqui -->
    <a href="https://form.jotform.com/260771551556057" 
       target="_blank"
       style="flex: 1; min-width: 120px; padding: 12px 16px; background-color: #000; color: white; text-decoration: none; font-size: 16px; border-radius: 4px; text-align: center;">
        Avaliar Agora
    </a>
    <a href="#" class="btn btn-fechar" onclick="window.close(); return false;" 
       style="flex: 1; min-width: 120px; padding: 12px 16px; background-color: #000; color: #fff; text-decoration: none; font-size: 16px; border-radius: 1px; text-align: center;">
        Fechar
    </a>
    <a href="https://bio.site/chmartinelle" class="btn btn-bio" target="_blank" 
       style="flex: 1; min-width: 120px; padding: 12px 16px; background-color: #000; color: white; text-decoration: none; font-size: 16px; border-radius: 4px; text-align: center;">
        Abrir Links da BIO
    </a>
</div>   
</div>    

</body>
</html>
