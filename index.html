<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado pela Leitura!</title>
    <style>
        body {
            font-family: 'Playfair Display', 'Inter', sans-serif;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
        }
        .btn-fechar {
            background-color: #e0e0e0;
            color: #333;
        }
        .btn-bio {
            background-color: #000000;
            color: white;
        }
        .btn-fechar:hover, .btn-bio:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Obrigado por visitar o artigo!</h1>
        <p>Sua leitura é muito importante para mim.</p>
        <a href="#" class="btn btn-fechar" onclick="window.close(); return false;">Fechar esta pagina</a>
        <a href="https://chmartinelle.type.link" class="btn btn-bio" target="_blank">Abrir Links da BIO</a>
    </div>
</body>
</html>
