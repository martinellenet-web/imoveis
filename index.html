<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalie o Conteúdo</title>
    <style>
        body {
            font-family: 'Playfair Display', 'Inter', sans-serif;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
        }
        .btn-fechar {
            background-color: #e0e0e0;
            color: #333;
        }
        .btn-bio {
            background-color: #000000;
            color: white;
        }
        .btn-fechar:hover, .btn-bio:hover {
            opacity: 0.9;
        }
        .form-group {
            margin: 15px 0;
        }
        .stars {
            font-size: 30px;
            color: #ccc;
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 4px;
            margin: 10px 0;
        }
        .stars input {
            display: none;
        }
        .stars label {
            cursor: pointer;
            color: #ccc;
            transition: color 0.2s;
        }
        .stars input:checked ~ label,
        .stars input:checked + label {
            color: #000000;
        }
        .stars input:not(:checked) + label:hover,
        .stars input:not(:checked) + label:hover ~ label {
            color: #000000;
        }
        #form-section, #thank-you-section {
            transition: opacity 0.5s ease;
        }
        #thank-you-section {
            display: none;
            opacity: 0;
        }
    </style>
</head>
<body>
    <!-- Seção do Formulário -->
    <div id="form-section" class="container">
        <form id="feedback-form">
            <p>Como você avalia o conteúdo?</p>
            <div class="stars form-group">
                <input type="radio" id="star5" name="rating" value="5" required>
                <label for="star5">★</label>
                <input type="radio" id="star4" name="rating" value="4">
                <label for="star4">★</label>
                <input type="radio" id="star3" name="rating" value="3">
                <label for="star3">★</label>
                <input type="radio" id="star2" name="rating" value="2">
                <label for="star2">★</label>
                <input type="radio" id="star1" name="rating" value="1">
                <label for="star1">★</label>
            </div>

            <div class="form-group">
                <label for="message">Deixe sua mensagem (opcional):</label>
                <textarea id="message" name="message" rows="4" style="width: 100%; padding: 8px;"></textarea>
            </div>

            <button type="submit" style="background-color: #007cba; color: white; padding: 10px 20px; border: none;">
                Enviar
            </button>
        </form>
    </div>

    <!-- Seção de Agradecimento -->
    <div id="thank-you-section" class="container">
        <h1>Obrigado pela avaliação!</h1>
        <p>Sua opinião é muito importante para mim.</p>
        <a href="#" class="btn btn-fechar" onclick="window.close(); return false;">Fechar esta página</a>
        <a href="https://bio.site/chmartinelle" class="btn btn-bio" target="_blank">Abrir Links da BIO</a>
    </div>
