<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação</title>
    <style>
    
   body {
        font-family: Arial, sans-serif;
        background-color: #ffffff !important;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100dvh; /* Use min-height e dvh */
        margin: 0;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); /* Evita corte nas laterais */
        filter: none !important;
    }

textarea {
    width: 100% !important;
    box-sizing: border-box;
    margin: 8px 0 0 0;
    padding: 8px;
    display: block;
}   

    .container {
        background-color: #ffffff;
        padding: 20px;
        border-radius: 0px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
        /* Usa dvh para altura visível real no mobile */
        min-height: 100dvh;
    }
   
        .btn-fechar, .btn-bio {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-fechar {
            background-color: #ccc;
            color: #FF5C00;
        }
        .btn-bio {
            background-color: #FF5C00;
            color: white;
        }
        .btn-fechar:hover, .btn-bio:hover {
            opacity: 0.9;
        }
        .stars {
            font-size: 30px;
            color: #ccc;
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 4px;
            margin: 10px 0;
        }
        .stars input {
            display: none;
        }
        .stars label {
            cursor: pointer;
            color: #ccc;
            transition: color 0.2s;
        }
        .stars input:checked ~ label,
        .stars input:checked + label,
        .stars input:not(:checked) + label:hover,
        .stars input:not(:checked) + label:hover ~ label {
            color: #FF5C00;
        }
        #form-section, #thank-you-section {
            transition: opacity 0.5s ease;
        }
        #thank-you-section {
            display: none;
            opacity: 0;
        }
        
        
      /* Container principal da linha */
        .progress-line {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #333;
            margin: 15px 0;
            font-family: Arial, sans-serif;
        }
        /* Estilo do rótulo "Leitura:" */
        .progress-label {
            margin-right: 10px;
            font-weight: bold;
            white-space: nowrap;
        }
        /* Estilo da barra de progresso */
        .progress-container {
            flex: 1;
            height: 20px;
            background-color: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 0 10px;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            width: 0;
            background-color: #FF6719;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        /* Estilo do número e símbolo de percentual */
        .progress-percent {
            margin-left: 10px;
            font-weight: bold;
            white-space: nowrap;
        }
        
        img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}   
        
    </style>
</head>


<body>

<div id="thank-you-section" class="container" style="display: block; opacity: 1; font-family: Arial, sans-serif;">

<div style="display: flex; justify-content: center; align-items: center; height: 100vh; width: 100%; margin: 0; padding: 0;">

    <span style="color: #FF6719; font-size: 18px;">★★★★☆ </span>

    <div class="progress-line">
        <span class="progress-label">Leitura:</span>
        <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
        </div>
        <span class="progress-percent" id="percent">0%</span>
    </div> 
    
  <!-- SEU WIDGET DE AVALIAÇÃO -->
 <div style="margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px; font-size: 14px; color: #555; text-align: center; padding: 10px;">

 <br><br>

<p style="margin: 5px 0;">

  <!-- Botões alinhados -->

     <script>
        // Função para atualizar a barra de progresso
        function atualizarBarra(percentual) {
            const bar = document.getElementById('bar');
            const percent = document.getElementById('percent');
            bar.style.width = percentual + '%';
            percent.textContent = percentual + '%';
        }

        // Define o percentual (altere este valor conforme necessário)
        atualizarBarra(84); // Exemplo: 75%
    </script>


</body>
</html>
