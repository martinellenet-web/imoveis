<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado pela Leitura!</title>
    <style>
        body {
            font-family: 'Playfair Display', 'Inter', sans-serif;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
        }
        .btn-fechar {
            background-color: #e0e0e0;
            color: #333;
        }
        .btn-bio {
            background-color: #000000;
            color: white;
        }
        .btn-fechar:hover, .btn-bio:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<form action="https://formspree.io/f/xojpgyjy" method="POST">
  <p>Como você avalia o conteúdo?</p>
  
  <!-- Campo de classificação por estrelas -->
  <div style="font-size: 30px; color: gold; margin: 10px 0;">
    <input type="radio" id="star5" name="rating" value="5" required />
    <label for="star5" style="cursor: pointer;">★</label>
    
    <input type="radio" id="star4" name="rating" value="4" />
    <label for="star4" style="cursor: pointer;">★</label>
    
    <input type="radio" id="star3" name="rating" value="3" />
    <label for="star3" style="cursor: pointer;">★</label>
    
    <input type="radio" id="star2" name="rating" value="2" />
    <label for="star2" style="cursor: pointer;">★</label>
    
    <input type="radio" id="star1" name="rating" value="1" />
    <label for="star1" style="cursor: pointer;">★</label>
  </div>

  <label for="message">Deixe sua mensagem (opcional):</label>
  <textarea id="message" name="message" rows="4" style="width: 100%; margin: 10px 0; padding: 8px;"></textarea>

  <button type="submit" style="background-color: #007cba; color: white; padding: 10px 20px; border: none; cursor: pointer;">
    Enviar
  </button>
</form>   

<br>

    <div class="container">
        <h1>Obrigado por visitar o link!</h1>
        <p>Sua visita é muito importante para mim.</p>
        <a href="#" class="btn btn-fechar" onclick="window.close(); return false;">Fechar esta pagina</a>
        <a href="https://bio.site/chmartinelle" class="btn btn-bio" target="_blank">Abrir Links da BIO</a>
    </div>
</body>
</html>
