/* VIDEO FULL WIDTH - SEM MARGENS */
.video-container {
    position: relative;
    width: 100vw; /* Ocupa 100% da largura da janela (viewport) */
    margin-left: calc(-50vw + 50%);
    
    padding-bottom: 56.25%; /* Mantém proporção 16:9 (ajuste se quiser mais baixo) */
    height: 0;
    overflow: hidden;
    
    margin-top: -50px;
    margin-bottom: 0px;
    
    border-radius: 0; /* Essencial para o efeito full */
    box-shadow: none; /* Sombras costumam denunciar bordas, melhor remover no full */
}

.video-container img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* AJUSTES PARA TELAS PEQUENAS */
@media (max-width: 768px) {
    .video-container {
        /* Aumenta a altura proporcional no mobile para a imagem aparecer melhor */
        padding-bottom: 100%; /* Proporção 1:1 (quadrada) ou use 120% para vertical */
        margin-top: -50px;
        margin-bottom: 0px;
    }

    .video-container img {
        /* Garante que o foco da imagem seja o centro no celular */
        object-position: center;
    }
}

@media (max-width: 480px) {

<style>
    .nota-estilizada {
        margin: 0 auto 100px auto; /* 100px de margem no final para o botão/respiro */
        padding: 25px;
        max-width: 800px; /* Alinhado com a largura da sua imagem/vídeo */
        
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 19px;
        line-height: 1.7;
        color: #333;
        
        background-color: #fff;
        border-radius: 8px;
        word-wrap: break-word;
    }

    /* Estilos para elementos do Obsidian (Markdown) */
    .nota-estilizada h1, .nota-estilizada h2, .nota-estilizada h3 {
        margin-top: 1.5em;
        margin-bottom: 0.5em;
        color: #000;

        max-width: 100%;
        height: auto;
        border-radius: 8px;
    }

    @media (max-width: 600px) {
        .nota-estilizada {
            font-size: 17px;
            padding: 15px;
        }
    }
</style>

<script>
    const arquivoNota = 'blog-0012.md?v=' + Date.now();

    function conversorMarkdownLite(texto) {
        return texto
            // Títulos (###, ##, #) - Ordem do maior para o menor é importante
            .replace(/^### (.*$)/gim, '<h3>$1</h3>')
            .replace(/^## (.*$)/gim, '<h2>$1</h2>')
            .replace(/^# (.*$)/gim, '<h1>$1</h1>')
            
            // Negrito (**texto**)
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            
            // Itálico (*texto*)
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            
            // Links [nome](url)
            .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" style="color:#007bff;text-decoration:none;">$1</a>')
            
            // Listas com hífen ou asterisco (- item ou * item)
            .replace(/^\s*[-*]\s+(.*)$/gim, '<li style="margin-left:20px;">$1</li>')
            
            // Quebras de linha (preserva parágrafos)
            .replace(/\n/g, '<br>');
    }

    fetch(arquivoNota)
        .then(response => {
            if (!response.ok) throw new Error('Arquivo não encontrado');
            return response.text();
        })
        .then(texto => {
            // Aplica o conversor direto no texto recebido
            document.getElementById('conteudo-nota').innerHTML = conversorMarkdownLite(texto);
        })
        .catch(err => {
            document.getElementById('conteudo-nota').innerHTML = "Erro ao carregar o conteúdo.";
            console.error(err);
        });
</script>

<script>
function fechar() {
    // Tenta fechar a aba
    window.close();

    // Pequeno delay para verificar se não fechou
    setTimeout(function() {

        // Tenta voltar no histórico
        if (window.history.length > 1) {
            window.history.back();
        } else {
            // Último recurso: redireciona
            window.location.href = "about:blank";
        }

    }, 500);
}
</script>
