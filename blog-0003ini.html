<style>
*{

body{

    background:#ffffff;

/* HEADER */
header{
    position:absolute;
    width:100%;
    padding:30px 8%;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
}

.logo{

/* HERO */
.hero{

    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
    overflow:hidden;
}

/* IMAGEM DE FUNDO COM ZOOM CORRIGIDO */
.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:url('mart-hero.jpg') center center / cover no-repeat;
    animation:zoomHero 20s ease-in-out infinite alternate;
    z-index:0;
}

/* MÁSCARA CORRIGIDA */
.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65));
    z-index:1;
}

/* CONTEÚDO SOBREPOSTO */
.hero-content{
    position:relative;
    z-index:2;
    max-width:900px;
    padding:20px;
}

.hero h1{
    font-family:'Playfair Display', serif;
    font-size:48px;
    margin-bottom:25px;
}

.hero p{
    font-size:24px;
    font-weight:300;
}

/* ANIMAÇÃO */
@keyframes zoomHero{
    from{transform:scale(1);}
    to{transform:scale(1.08);}
}


/* SEÇÕES */
.section{
    font-size:22px;
    padding:50px 10%;
    background:#ffffff;
    color:white;
}

.section-dark{
    background:#f4f7fc;
    color:#000000;
}

.section h2{
    font-size:36px;
    margin-bottom:40px;
    text-align:left;
}

/* VIDEO */
.video-container{
    position:relative;
    padding-bottom:45%;
    height:0;
    overflow:hidden;
    max-width:800px;
    margin:40px auto 10px auto;
    border-radius:12px;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);

}

.video-container img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover; /* A imagem preenche todo o contêiner, cortando o excesso */
    object-position: center; /* Centraliza a imagem dentro do contêiner */
}   

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:40px;
    margin-top:50px;
}

.card{
    background:white;
    padding:40px;
    border-radius:10px;

}

.card:hover{

}

.card h3{

/* DESTAQUE */

.buttons{

.btn-primary{

    text-decoration:none;

    font-weight:500;

.btn-primary:hover{

/* FOOTER */
footer{

    padding:30px;
    font-size:14px;
    padding-bottom:30px;

}

/* MART FLUTUANTE */
.mart-container{
    position:fixed;
    bottom:30px;
    right:30px;
    z-index:9999;
}

.mart-bubble{
    position:absolute;
    bottom:115px;
    right:0;
    background:white;
    color:#1D67CD;
    padding:10px 18px;
    border-radius:20px;
    font-size:14px;
    font-weight:500;

}

.mart-bubble::after{
    content:"";
    position:absolute;
    bottom:-8px;
    right:35px;
    border-left:8px solid transparent;
    border-right:8px solid transparent;

}

.mart-float{
    width:90px;

    border-radius:50%;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    animation:floatMart 3s ease-in-out infinite;
    transition:0.3s;

}

.mart-float img{

}

.mart-float:hover{

}

.faq-section .faq-question::after {

.faq-section .faq-answer {

<section>

<!-- Onde o texto vai aparecer com estilo aplicado -->
<div id="conteudo-nota" class="nota-estilizada">
    Carregando nota...
</div>

<style>
    .nota-estilizada {
        /* Margens e Espaçamento */
        margin: 20px auto;
        padding: 25px;
        max-width: 800px; /* Evita que a linha fique larga demais para ler */
        
        /* Tipografia */
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 19px;       /* Tamanho maior para leitura confortável */
        line-height: 1.7;      /* Espaço entre linhas */
        color: #333;           /* Cor grafite escuro (melhor que preto puro) */
        
        /* Preservar formatação do Simplenote */
        white-space: pre-wrap; /* Respeita quebras de linha e espaços */
        word-wrap: break-word; /* Evita que palavras grandes quebrem o layout */
        
        /* Estética opcional */
        background-color: #fff;
        border-radius: 8px;
    }

    /* Ajuste para telas de celular */
    @media (max-width: 600px) {
        .nota-estilizada {
            font-size: 17px;
            padding: 15px;
        }
    }
</style>


<script>
    const arquivoNota = 'blog-0003ini.txt'; // Nome corrigido

    fetch(arquivoNota)
        .then(response => {
            if (!response.ok) throw new Error('Arquivo não encontrado');
            return response.text();
        })
        .then(texto => {
            // Usamos innerText para segurança e preservar as quebras do Simplenote
            document.getElementById('conteudo-nota').innerText = texto;
        })
        .catch(err => {
            document.getElementById('conteudo-nota').innerHTML = "Erro ao carregar o conteúdo.";
        });
</script>

<br>
<br>
</section>




<footer>

<!-- Botão para fechar a página -->
<button onclick="window.close()" class="botao-share">
    Fechar
</button>

<!-- Botão de Compartilhar -->
<button id="btnCompartilhar" class="botao-share">
    Compartilhar esta página
</button>

<script>
const btn = document.querySelector('#btnCompartilhar');

btn.addEventListener('click', () => {
  if (navigator.share) {
    navigator.share({
      title: document.title,
      text: 'Confira este post!', // Texto simples, sem variáveis perigosas
      url: window.location.href
    })
    .then(() => console.log('Compartilhado com sucesso!'))
    .catch((error) => {
      console.warn('Erro ao compartilhar:', error);
      // Evite expor erro ao usuário final
    });
  } else {
    alert("Compartilhamento não suportado. Copie o link da barra de endereços.");
  }
});
</script>   
<br>
<br>

</footer>   





<script>
  document.querySelectorAll('.faq-question').forEach(question => {
    question.addEventListener('click', () => {
      const item = question.parentElement;
      item.classList.toggle('active');
    });
  });
</script>
